# =============================================================================
#  Praxis — Default Configuration
#  Explainable DR Grading with Patient Comorbidity Risk Networks
#  Tuned for: NVIDIA RTX 3050 (4 GB VRAM) + CUDA 12.x
# =============================================================================

# ── Paths ────────────────────────────────────────────────────────────────────
paths:
  # Real APTOS 2019 dataset location
  _aptos_root: "data/raw/aptos2019"

  # Image directories — all labelled images live in train_images/
  # train/val/test splits are handled via CSVs only
  train_images: "data/raw/aptos2019/train_images/train_images"
  val_images:   "data/raw/aptos2019/train_images/train_images"
  test_images:  "data/raw/aptos2019/train_images/train_images"

  # CSV label files (generated by scripts/split_data.py)
  train_csv: "data/raw/aptos2019/train_split.csv"
  val_csv:   "data/raw/aptos2019/val_split.csv"
  test_csv:  "data/raw/aptos2019/test_split.csv"

  # Clinical metadata
  metadata_csv: "data/metadata/clinical_metadata.csv"

  # Output directories
  model_save_dir: "outputs/models"
  figures_dir:    "outputs/figures"
  gradcam_dir:    "outputs/gradcam"
  network_dir:    "outputs/network"

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  image_size: 224
  num_classes: 5
  class_names:
    - "No DR"
    - "Mild"
    - "Moderate"
    - "Severe"
    - "Proliferative DR"
  split_ratios:
    train: 0.70
    val: 0.15
    test: 0.15
  random_seed: 42

# ── Preprocessing ────────────────────────────────────────────────────────────
preprocessing:
  ben_graham:
    enabled: true
    sigma: 10           # Gaussian blur sigma for background subtraction
  normalization:
    mean: [0.485, 0.456, 0.406]    # ImageNet statistics
    std:  [0.229, 0.224, 0.225]

# ── Augmentation ─────────────────────────────────────────────────────────────
augmentation:
  horizontal_flip: true
  vertical_flip: false
  rotation_limit: 30
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  random_crop: false

# ── Model ────────────────────────────────────────────────────────────────────
model:
  architecture: "resnet50"       # resnet50 | vgg16
  pretrained: true               # ImageNet pretrained weights
  freeze_strategy: "partial"     # full | partial | none
  unfreeze_blocks: 2             # number of final residual blocks to unfreeze
  fc_hidden: 512
  dropout: 0.3

# ── Training (tuned for RTX 3050 4 GB) ───────────────────────────────────────
training:
  epochs: 30
  batch_size: 16                 # 16 is safe for 4 GB VRAM; raise to 24 if stable
  learning_rate: 0.0003          # slightly higher than default for faster warmup
  weight_decay: 0.0001           # L2 regularization
  optimizer: "adam"              # adam | sgd
  mixed_precision: true          # ✅ torch.cuda.amp — halves VRAM, ~2x speedup
  num_workers: 2                 # reduced from 4 to prevent OOM on large images
  pin_memory: true               # fast host→GPU transfer
  scheduler:
    type: "cosine"               # cosine | step | plateau
    step_size: 10                # for StepLR
    gamma: 0.1                   # for StepLR
    patience: 5                  # for ReduceLROnPlateau
  early_stopping:
    enabled: true
    patience: 7
    min_delta: 0.001
    monitor: "val_qwk"           # val_loss | val_qwk
  class_weighting: true          # inverse-frequency class weights
  label_smoothing: 0.1           # prevents overconfidence on imbalanced classes

# ── Explainability ───────────────────────────────────────────────────────────
explainability:
  method: "gradcam"              # gradcam | gradcam++ | scorecam
  target_layer: "layer4"        # ResNet-50 final conv block
  num_samples: 25                # number of images to generate heatmaps for
  colormap: "jet"
  alpha: 0.5                     # heatmap overlay transparency

# ── Patient Similarity Network ───────────────────────────────────────────────
network:
  similarity_metric: "cosine"    # cosine | euclidean
  edge_threshold: 0.85           # minimum similarity to create edge
  clinical_features:
    - "age"
    - "hba1c"
    - "bmi"
    - "bp_systolic"
    - "bp_diastolic"
    - "diabetes_duration"
    - "cholesterol"
    - "smoking"
  analysis:
    degree_centrality: true
    betweenness_centrality: true
    closeness_centrality: true
    louvain_resolution: 1.0      # community detection resolution
  visualization:
    layout: "spring"             # spring | kamada_kawai | circular
    node_size_by: "degree"       # degree | betweenness | dr_grade
    node_color_by: "community"   # community | dr_grade
    export_gexf: true            # for Gephi import

# ── Evaluation ───────────────────────────────────────────────────────────────
evaluation:
  metrics:
    - "quadratic_weighted_kappa"
    - "auroc"
    - "f1_weighted"
    - "precision"
    - "recall"
    - "confusion_matrix"
  k_folds: 5                    # for cross-validation (optional)
  baseline_comparison: true      # train VGG-16 + scratch baselines
